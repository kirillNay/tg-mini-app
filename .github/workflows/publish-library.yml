name: Publish Library

on:
  push:
    branches:
      - master

concurrency:
  group: publish-library-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish library
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether version was bumped
        id: version-gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Initial push detected; publishing is allowed."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git show "${{ github.event.before }}:build.gradle.kts" > /tmp/base-build.gradle.kts

          if bash scripts/ci/validate-version-bump.sh /tmp/base-build.gradle.kts build.gradle.kts; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version was not bumped. Publish steps will be skipped."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.version-gate.outputs.should_publish == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate publication secrets
        if: steps.version-gate.outputs.should_publish == 'true'
        shell: bash
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          set -euo pipefail

          for secret_name in SONATYPE_USERNAME SONATYPE_PASSWORD SIGNING_KEY SIGNING_PASSWORD; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing required GitHub secret ${secret_name}"
              exit 1
            fi
          done

          if [[ "${SIGNING_KEY}" != *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "::error::SIGNING_KEY must contain an ASCII-armored private key exported with gpg --armor --export-secret-keys"
            exit 1
          fi

      - name: Skip publish without version bump
        if: steps.version-gate.outputs.should_publish != 'true'
        run: echo "No library version bump detected. Publish was skipped."

      - name: Build and publish to Sonatype
        if: steps.version-gate.outputs.should_publish == 'true'
        shell: bash
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew --no-daemon build publishToSonatype closeAndReleaseStagingRepositories
