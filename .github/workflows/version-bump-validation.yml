name: Validate Version Bump

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: version-bump-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-version:
    name: Validate version bump
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare library versions
        shell: bash
        run: |
          set -euo pipefail
          git show "${{ github.event.pull_request.base.sha }}:build.gradle.kts" > /tmp/base-build.gradle.kts
          bash scripts/ci/validate-version-bump.sh /tmp/base-build.gradle.kts build.gradle.kts
